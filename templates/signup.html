{% extends "layout.html" %}

{% block content %}
<div class="auth-container card">
    <div class="auth-header">
        <h2>Doctor Registration</h2>
        <p class="text-muted">Create your medical account</p>
    </div>
    
    <form method="POST" action="{{ url_for('signup') }}">
        <div class="form-group">
            <label for="name">Full Name (with Title)</label>
            <input type="text" id="name" name="name" class="form-control" placeholder="e.g. Dr. John Smith" required>
        </div>

        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control" required>
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create Account</button>
    </form>
    
    <div class="text-center mt-4">
        <p class="text-muted">Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary-color); font-weight: 600;">Login</a></p>
    </div>
</div>
{% endblock %}
